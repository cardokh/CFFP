<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HejSan - Choose Interaction Style</title>

    <link rel="stylesheet" href="css/index.css" />
</head>

<body>

    <main class="landing-page">

        <section class="landing-panel">

            <div class="landing-glow"></div>

            <div class="robot-orbit-zone">

                <div class="orbit-ring ring-one"></div>
                <div class="orbit-ring ring-two"></div>
                <div class="orbit-ring ring-three"></div>

                <div class="floating-token token-one">Hej!</div>
                <div class="floating-token token-two">Bra!</div>
                <div class="floating-token token-three">Tack!</div>

                <div class="robot-core">
                    <div class="robot-face">🤖</div>
                    <div class="robot-pulse"></div>
                </div>

            </div>

            <div class="landing-copy">

                <p class="landing-eyebrow">
                    AI + HRI Language Learning
                </p>

                <h1>
                    Welcome to HejSan
                </h1>

                <p class="landing-description">
                    Choose how you want to continue. Use the mobile interface
                    for a compact learning flow, or enter the desktop interface
                    for the full learning workspace.
                </p>

                <div class="interaction-buttons">

                    <button id="mobile-style-button" class="style-button primary-button">
                        Mobile Interaction
                    </button>

                    <button id="desktop-style-button" class="style-button secondary-button">
                        Desktop Interaction
                    </button>


                </div>

            </div>

            <div class="signal-panel">

                <div class="signal-card">
                    <span class="signal-label">Language</span>
                    <strong>Swedish</strong>
                </div>

                <div class="signal-card">
                    <span class="signal-label">Tutor</span>
                    <strong>Virtual Robot</strong>
                </div>

                <div class="signal-card">
                    <span class="signal-label">Mode</span>
                    <strong>Choose Interface</strong>
                </div>

                <div class="signal-bars">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

            </div>

        </section>

    </main>

    <script src="/shared/frontend-paths.js"></script>
    <script src="/shared/interaction-style.js"></script>
    <script src="/js/index-controller.js"></script>

</body>

</html>
