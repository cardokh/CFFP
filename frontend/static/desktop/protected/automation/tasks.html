<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Tasks | CFFP</title>

    <link rel="stylesheet" href="/desktop/shared/styles/protected-layout.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-panels.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-tables.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-table-toolbar.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-search.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-buttons.css">

    <link rel="stylesheet" href="./css/tasks.css">
</head>

<body>

    <main class="dashboard-layout">

        <div id="desktop-sidebar-container"></div>

        <section class="main-content">

            <div id="header-panel-container"></div>

            <section class="protected-content-panel">

                <div class="automation-registry-content">

                    <header class="automation-registry-header">
                        <p class="automation-registry-kicker">CCore Automation</p>

                        <h1>Automation Tasks</h1>

                        <p class="automation-registry-summary">
                            Registered automation tasks are loaded from the backend registry.
                            Tasks are reusable units of work; details and metadata are available from each task's details page.
                        </p>
                    </header>

                    <div id="automationTasksMessage" class="form-message info hidden"></div>

                    <fieldset class="shared-panel automation-registry-card automation-tasks-card">
                        <legend>Registered Tasks</legend>

                        <div class="automation-registry-table-inner automation-tasks-table-inner">

                            <div class="shared-table-wrapper">

                                <table class="shared-table automation-registry-table automation-tasks-table">

                                    <thead>
                                        <tr>
                                            <th>
                                                <button class="shared-table-sort-button sorted-asc" type="button" data-sort-key="name" data-sort-direction="asc">
                                                    Name
                                                </button>
                                            </th>
                                            <th>
                                                <button class="shared-table-sort-button" type="button" data-sort-key="category">
                                                    Category
                                                </button>
                                            </th>
                                            <th>
                                                <button class="shared-table-sort-button" type="button" data-sort-key="status">
                                                    Status
                                                </button>
                                            </th>
                                            <th>State</th>
                                        </tr>
                                    </thead>

                                    <tbody id="automationTasksTableBody">
                                        <tr>
                                            <td colspan="4" class="shared-table-empty-state">
                                                Loading automation tasks...
                                            </td>
                                        </tr>
                                    </tbody>

                                </table>

                            </div>

                        </div>

                    </fieldset>

                    <section class="shared-toolbar-panel shared-table-toolbar automation-registry-toolbar automation-tasks-table-toolbar">

                        <div class="shared-table-toolbar-left">
                            <a id="backToAutomationButton" class="shared-button secondary shared-table-toolbar-action" href="#">
                                Back to Automation
                            </a>
                        </div>

                        <div class="shared-table-toolbar-center">
                            <label class="shared-search-box shared-table-toolbar-search" for="automationTasksSearchInput">
                                <span class="shared-search-icon">⌕</span>
                                <input id="automationTasksSearchInput" class="shared-search-input" type="search" placeholder="Search tasks..." disabled>
                            </label>

                            <div class="shared-table-pagination shared-table-toolbar-pagination" aria-label="Automation tasks pagination">
                                <button id="automationTasksPreviousPageButton" class="shared-button secondary" type="button" disabled>
                                    ‹ Prev
                                </button>

                                <span id="automationTasksPaginationStatus" class="shared-table-pagination-status">
                                    Page 1 of 1
                                </span>

                                <button id="automationTasksNextPageButton" class="shared-button secondary" type="button" disabled>
                                    Next ›
                                </button>
                            </div>
                        </div>

                        <div class="shared-table-toolbar-right">
                            <span id="automationTasksCount" class="automation-registry-count automation-tasks-count">
                                0 tasks
                            </span>

                            <button id="refreshAutomationTasksButton" class="shared-button secondary shared-table-toolbar-action" type="button">
                                Refresh
                            </button>
                        </div>

                    </section>

                </div>

            </section>

            <div id="footer-panel-container"></div>

        </section>

    </main>

    <script src="/desktop/protected/shared/components/protected-workspace/protected-workspace.js"></script>

    <script>
        loadProtectedWorkspace("automation")
            .then(async () => {
                await loadProtectedWorkspaceScript("/desktop/shared/js/table-search.js");
                await loadProtectedWorkspaceScript("/desktop/shared/js/table-pagination.js");

                const pageScript = document.createElement("script");
                pageScript.src = "./js/tasks.js";
                document.body.appendChild(pageScript);
            });
    </script>

</body>

</html>
