<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Pipeline Details | CFFP</title>

    <link rel="stylesheet" href="/desktop/shared/styles/protected-layout.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-panels.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-tables.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-buttons.css">

    <link rel="stylesheet" href="./css/details.css">
</head>

<body>

    <main class="dashboard-layout">

        <div id="desktop-sidebar-container"></div>

        <section class="main-content">

            <div id="header-panel-container"></div>

            <section class="protected-content-panel">

                <div class="automation-task-details-content">

                    <section class="automation-task-details-heading" aria-labelledby="automationPipelineDetailsTitle">
                        <div>
                            <p class="automation-task-details-kicker">CCore Automation</p>

                            <h1 id="automationPipelineDetailsTitle">
                                Automation Pipeline Details
                            </h1>

                            <div class="automation-task-details-state-row" aria-label="Automation pipeline state">
                                <span id="automationPipelineDetailsStatus" class="automation-task-details-status unknown">
                                    Unknown
                                </span>

                                <span id="automationPipelineDetailsCategory" class="automation-task-details-category">
                                    uncategorized
                                </span>
                            </div>

                            <p id="automationPipelineDetailsSummary" class="automation-task-details-summary">
                                Loading automation pipeline details...
                            </p>
                        </div>

                        <div class="automation-task-details-actions">
                            <a id="backToAutomationPipelinesLink" class="shared-button secondary" href="/desktop/protected/automation/pipelines.html">
                                Back to Pipelines
                            </a>

                            <button id="refreshAutomationPipelineDetailsButton" class="shared-button secondary" type="button">
                                Refresh
                            </button>
                        </div>
                    </section>

                    <div id="automationPipelineDetailsMessage" class="form-message info hidden"></div>

                    <div id="automationPipelineDetailsBody" class="automation-task-details-body">
                        <section class="shared-panel automation-task-details-card">
                            <p class="automation-task-details-placeholder">
                                Loading automation pipeline details...
                            </p>
                        </section>
                    </div>

                </div>

            </section>

            <div id="footer-panel-container"></div>

        </section>

    </main>

    <script src="/desktop/protected/shared/components/protected-workspace/protected-workspace.js"></script>

    <script>
        loadProtectedWorkspace("automation")
            .then(async () => {
                const pageScript = document.createElement("script");
                pageScript.src = "./js/pipeline-details.js";
                document.body.appendChild(pageScript);
            });
    </script>

</body>

</html>
