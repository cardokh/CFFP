<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Questions | HejSan</title>

    <link rel="stylesheet" href="/desktop/shared/styles/protected-layout.css">

    <link rel="stylesheet" href="/desktop/shared/styles/shared-table-toolbar.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-buttons.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-panels.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-tables.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-search.css">

    <link rel="stylesheet" href="./css/quiz-questions.css">
</head>

<body>

    <main class="dashboard-layout">

        <div id="desktop-sidebar-container"></div>

        <section class="main-content">

            <div id="header-panel-container"></div>

            <section class="protected-content-panel">

                <div class="quiz-questions-content">

                    <div id="quizQuestionsMessage" class="form-message hidden"></div>

                    <fieldset class="shared-panel quiz-questions-card">
                        <legend>Quiz Questions</legend>

                        <div class="quiz-questions-table-inner">

                            <div class="shared-table-wrapper">

                                <table class="shared-table quiz-questions-table">

                                    <thead>
                                        <tr>
                                            <th>
                                                <button class="shared-table-sort-button" data-sort-column="0"
                                                    data-sort-type="number" type="button">
                                                    ID
                                                </button>
                                            </th>

                                            <th>
                                                <button class="shared-table-sort-button" data-sort-column="1"
                                                    type="button">
                                                    Question
                                                </button>
                                            </th>

                                            <th>
                                                <button class="shared-table-sort-button" data-sort-column="2"
                                                    type="button">
                                                    Category
                                                </button>
                                            </th>

                                            <th>
                                                <button class="shared-table-sort-button" data-sort-column="3"
                                                    type="button">
                                                    Active
                                                </button>
                                            </th>
                                        </tr>
                                    </thead>

                                    <tbody id="quizQuestionsTableBody">
                                        <tr>
                                            <td colspan="4">
                                                Loading quiz questions...
                                            </td>
                                        </tr>
                                    </tbody>

                                </table>

                            </div>

                        </div>

                    </fieldset>




                    <section class="shared-toolbar-panel shared-table-toolbar">

                        <div class="shared-table-toolbar-left">

                            <button id="backToAdminButton" class="shared-button secondary shared-table-toolbar-action"
                                type="button">
                                Back to Admin
                            </button>

                        </div>

                        <div class="shared-table-toolbar-center">

                            <div class="shared-search-box shared-table-toolbar-search">
                                <span class="shared-search-icon">⌕</span>

                                <input id="quizQuestionsSearchInput" class="shared-search-input" type="text"
                                    placeholder="Search..." disabled>
                            </div>

                            <div class="shared-table-pagination shared-table-toolbar-pagination">
                                <button id="quizQuestionsPreviousPageButton" class="shared-button secondary"
                                    type="button" disabled>
                                    ‹ Prev
                                </button>

                                <span id="quizQuestionsPaginationStatus" class="shared-table-pagination-status">
                                    Page 1 of 1
                                </span>

                                <button id="quizQuestionsNextPageButton" class="shared-button secondary" type="button"
                                    disabled>
                                    Next ›
                                </button>
                            </div>

                        </div>

                        <div class="shared-table-toolbar-right">

                            <button id="deleteSelectedQuizQuestionsButton"
                                class="shared-button secondary shared-table-toolbar-action" type="button" disabled>
                                Delete Selected
                            </button>

                            <button id="addQuizQuestionButton" class="shared-button primary shared-table-toolbar-action"
                                type="button">
                                Add Quiz Question
                            </button>

                        </div>

                    </section>

                </div>

            </section>

            <div id="footer-panel-container"></div>

        </section>

    </main>

    <script src="/desktop/protected/shared/components/protected-workspace/protected-workspace.js"></script>

    <script src="/desktop/shared/js/table-sorter.js"></script>

    <script>
        loadProtectedWorkspace("admin")
            .then(() => {
                const pageScript = document.createElement("script");
                pageScript.src = "./js/quiz-questions.js?v=4";
                document.body.appendChild(pageScript);
            });
    </script>

</body>

</html>
