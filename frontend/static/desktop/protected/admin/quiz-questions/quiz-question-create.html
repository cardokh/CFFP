<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz Question | HejSan</title>

    <link rel="stylesheet" href="/desktop/shared/styles/protected-layout.css">

    <link rel="stylesheet" href="/desktop/shared/styles/shared-messages.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-panels.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-buttons.css">
    <link rel="stylesheet" href="/desktop/shared/styles/shared-tables.css">

    <link rel="stylesheet" href="./css/quiz-questions-create.css">
</head>

<body>

    <main class="dashboard-layout">

        <div id="desktop-sidebar-container"></div>

        <section class="main-content">

            <div id="header-panel-container"></div>

            <section class="protected-content-panel">

                <div class="quiz-question-create-content">

                    <div class="quiz-question-create-scroll-panel">

                        <fieldset class="quiz-question-details-panel">
                            <legend>Quiz Question Details</legend>

                            <form id="quizQuestionCreateForm" class="quiz-question-create-form">

                                <div class="form-row question-row">
                                    <label for="questionText">Question</label>
                                    <textarea id="questionText" rows="2" required></textarea>
                                </div>

                                <div class="form-row category-row">
                                    <label for="categoryId">Category</label>
                                    <select id="categoryId" required></select>
                                </div>

                                <div class="form-row checkbox-row active-row">
                                    <label>
                                        <input type="checkbox" id="isActive" checked>
                                        Active
                                    </label>
                                </div>

                            </form>

                        </fieldset>

                        <fieldset class="quiz-question-option-details-panel">
                            <legend>Add Answer Option</legend>

                            <div class="quiz-question-option-details-form">

                                <div class="form-row option-text-row">
                                    <label for="answerOptionText">Option Text</label>
                                    <input id="answerOptionText" type="text" placeholder="Option text">
                                </div>

                                <div class="form-row checkbox-row correct-row">
                                    <label>
                                        <input type="checkbox" id="answerOptionIsCorrect">
                                        Correct
                                    </label>
                                </div>

                                <button id="addQuizQuestionOptionButton" class="quiz-question-create-button secondary"
                                    type="button">
                                    Add
                                </button>

                            </div>

                        </fieldset>

                        <fieldset class="quiz-question-options-panel">
                            <legend>Answer Options</legend>

                            <div class="shared-table-wrapper quiz-question-options-table-wrapper">

                                <table class="shared-table quiz-question-options-table">

                                    <thead>
                                        <tr>
                                            <th>Order</th>
                                            <th>Option Text</th>
                                            <th>Correct</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>

                                    <tbody id="quizQuestionOptionsTableBody">
                                        <tr>
                                            <td colspan="4">No answer options added yet.</td>
                                        </tr>
                                    </tbody>

                                </table>

                            </div>

                        </fieldset>

                    </div>

                    <section class="shared-message-panel">
                        <div id="quizQuestionCreateMessage" class="form-message hidden"></div>
                    </section>

                    <section class="quiz-question-create-toolbar-panel">

                        <div class="quiz-question-create-toolbar-left">

                            <button id="backToQuizQuestionsButton" class="quiz-question-create-button secondary"
                                type="button">
                                Back to quiz questions
                            </button>

                        </div>

                        <div class="quiz-question-create-toolbar-right">

                            <button id="createQuizQuestionButton" class="quiz-question-create-button primary"
                                type="submit" form="quizQuestionCreateForm">
                                Create quiz question
                            </button>

                        </div>

                    </section>

                </div>

            </section>

            <div id="footer-panel-container"></div>

        </section>

    </main>

    <script src="/desktop/protected/shared/components/protected-workspace/protected-workspace.js"></script>

    <script>
        loadProtectedWorkspace("admin")
            .then(() => {
                const pageScript = document.createElement("script");
                pageScript.src = "./js/quiz-questions-create.js?v=7";
                document.body.appendChild(pageScript);
            });
    </script>

</body>

</html>
