<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Item Details | HejSan</title>

    <link rel="stylesheet" href="/shared/protected-layout.css">
    <link rel="stylesheet" href="./css/learning-item-details.css">
</head>

<body>

    <main class="dashboard-layout">

        <div id="desktop-sidebar-container"></div>

        <section class="main-content">

            <div id="admin-top-panel-container"></div>

            <div class="learning-item-details-content">

                <div id="learningItemDetailsMessage" class="form-message hidden"></div>

                <fieldset class="learning-item-details-card">
                    <legend>Read-only learning item information</legend>

                    <div class="learning-item-details-inner">

                        <div id="learningItemDetailsCard">
                            <p>Loading learning item details...</p>
                        </div>

                        <section class="learning-item-details-actions">

                            <button id="backToLearningItemsButton" class="learning-item-details-button" type="button">
                                Back to learning items
                            </button>

                            <button id="editLearningItemButton" class="learning-item-details-button" type="button">
                                Edit learning item
                            </button>

                            <button id="deleteLearningItemButton" class="learning-item-details-button delete"
                                type="button">
                                Delete learning item
                            </button>

                        </section>

                    </div>

                </fieldset>

            </div>

        </section>

    </main>

    <script src="/shared/frontend-paths.js"></script>
    <script src="/shared/api-endpoints.js"></script>
    <script src="/shared/api.js"></script>
    <script src="/shared/ui-messages.js"></script>
    <script src="/shared/ui-state.js"></script>
    <script src="/shared/ui-render.js"></script>

    <script src="/desktop/shared/components/sidebar/sidebar.js"></script>
    <script src="/desktop/protected/admin/js/admin-top-panel.js"></script>

    <script>
        loadSidebar("admin");
        loadAdminTopPanel("learningItems");
    </script>

    <script src="./js/learning-item-details.js"></script>

</body>

</html>
