<section class="student-top-panel student-learning-companion-panel">

    <div class="student-companion-robot-area">
        <div class="student-companion-orbit"></div>

        <div class="student-companion-robot">
            🤖
        </div>

        <div class="student-companion-signal student-companion-signal-one"></div>
        <div class="student-companion-signal student-companion-signal-two"></div>
        <div class="student-companion-signal student-companion-signal-three"></div>
    </div>

    <div class="student-panel-message">
        <p id="studentTopPanelGreeting" class="student-panel-greeting">
            Hej! 👋
        </p>

        <p class="student-panel-subtitle">
            Your Swedish learning companion is ready.
        </p>

        <div class="student-learning-flow">
            <span class="student-learning-flow-step">Listen</span>
            <span class="student-learning-flow-arrow">→</span>
            <span class="student-learning-flow-step">Repeat</span>
            <span class="student-learning-flow-arrow">→</span>
            <span class="student-learning-flow-step">Quiz</span>
        </div>
    </div>

    <div class="student-learning-celebration" aria-hidden="true">

        <div class="student-happy-learner">
            🧑‍🎓
        </div>

        <div class="student-learning-speech-bubble">
            Jag lär mig svenska!
        </div>

        <span class="student-floating-word student-floating-word-one">
            Hej!
        </span>

        <span class="student-floating-word student-floating-word-two">
            Tack!
        </span>

        <span class="student-floating-word student-floating-word-three">
            Bra!
        </span>

        <span class="student-celebration-particle student-celebration-particle-one">
            ✨
        </span>

        <span class="student-celebration-particle student-celebration-particle-two">
            💙
        </span>

        <span class="student-celebration-particle student-celebration-particle-three">
            ⭐
        </span>

    </div>

    <fieldset class="student-companion-mode-panel">

        <legend>Today&apos;s Learning Mode</legend>

        <div class="student-companion-mode-grid">

            <div class="student-companion-mode-card">
                <span class="student-companion-mode-icon">🇸🇪</span>
                <span class="student-companion-mode-label">Language</span>
                <strong>Swedish</strong>
            </div>

            <div class="student-companion-mode-card">
                <span class="student-companion-mode-icon">🤖</span>
                <span class="student-companion-mode-label">Embodiment</span>
                <strong>Virtual Robot</strong>
            </div>

            <div class="student-companion-mode-card">
                <span class="student-companion-mode-icon">✨</span>
                <span class="student-companion-mode-label">Style</span>
                <strong>Encouraging</strong>
            </div>

        </div>

        <div class="student-companion-waveform" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

    </fieldset>

</section>
