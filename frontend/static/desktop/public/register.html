<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LLA Desktop Register</title>

    <link rel="stylesheet" href="./css/desktop.css">
</head>

<body>

    <div id="interaction-toolbar-container"></div>

    <main class="desktop-login">

        <section class="left-panel">

            <header class="top-bar">
                <div class="brand-mark">H</div>
                <span>HejSan</span>
            </header>

            <div class="robot-area">
                <div class="robot-large">🤖</div>

                <div class="speech-bubble">
                    Welcome! Create your account and start learning useful Swedish phrases.
                    <span>🌱</span>
                </div>
            </div>

        </section>

        <section class="right-panel">

            <div class="login-card">

                <h1>Create account</h1>

                <p class="subtitle">
                    Join HejSan and practise practical Swedish in short, friendly sessions.
                </p>

                <div class="tab-row">
                    <button id="goToLoginButton" type="button" class="tab">
                        Sign in
                    </button>

                    <button type="button" class="tab active">
                        Sign up
                    </button>
                </div>

                <form id="registerForm">

                    <label for="displayName">Display name</label>

                    <input id="displayName" name="displayName" type="text" autocomplete="name">

                    <label for="email">Email</label>

                    <input id="email" name="email" type="email" autocomplete="email">

                    <label for="password">Password</label>

                    <input id="password" name="password" type="password" autocomplete="new-password">

                    <label for="confirmPassword">Confirm password</label>

                    <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password">

                    <button id="registerButton" class="login-button" type="submit">
                        Create account
                    </button>

                </form>

                <p id="registerMessage" class="login-message"></p>

                <div class="divider">
                    <span>OR</span>
                </div>

                <button id="loginLinkButton" type="button" class="guest-button">
                    Already have an account? Sign in
                </button>

                <p class="terms">
                    Your account will be created immediately after registration.
                </p>

            </div>

        </section>

    </main>

    <script src="../shared/components/interaction-toolbar/interaction-toolbar.js"></script>
    <script src="../../shared/api.js"></script>
    <script src="../../shared/api-endpoints.js"></script>
    <script src="./js/register.js"></script>

    <script>
        loadInteractionToolbar("register");
    </script>

</body>

</html>
