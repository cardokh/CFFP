<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LLA Forgot Password</title>

    <link rel="stylesheet" href="./css/desktop.css">
</head>

<body>

    <div id="interaction-toolbar-container"></div>

    <main class="desktop-login">

        <section class="left-panel">

            <header class="top-bar">
                <div class="brand-mark">H</div>
                <span>HejSan</span>
            </header>

            <div class="robot-area">
                <div class="robot-large">🤖</div>

                <div class="speech-bubble">
                    Don’t worry. We’ll help you recover access.
                    <span>🔑</span>
                </div>
            </div>

        </section>

        <section class="right-panel">

            <div class="login-card">

                <h1>Forgot password?</h1>

                <p class="subtitle">
                    Enter your email address and we’ll send you a recovery link.
                </p>

                <form id="forgotPasswordForm">

                    <label for="email">Email</label>

                    <input id="email" name="email" type="email" placeholder="your@email.com">

                    <button id="sendResetButton" class="login-button" type="submit">
                        Send recovery link
                    </button>

                </form>

                <p id="forgotPasswordMessage" class="login-message"></p>

                <p class="helper-link">
                    Remembered your password?
                    <span id="goToLoginButton">Sign in</span>
                </p>

                <p class="terms">
                    Demo implementation:
                    no real email is sent in this prototype.
                </p>

            </div>

        </section>

    </main>

    <script src="../shared/components/interaction-toolbar/interaction-toolbar.js"></script>
    <script src="./js/forgot-password.js"></script>

    <script>
        loadInteractionToolbar("forgotPassword");
    </script>

</body>

</html>
