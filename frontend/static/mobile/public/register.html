<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LLA Mobile Register</title>

    <link rel="stylesheet" href="./css/mobile.css">
</head>

<body>

    <!--
        Mobile registration page.

        Responsibilities:
        - Present the registration flow in the mobile interaction style
        - Collect account details from the user
        - Delegate registration behavior to js/register.js
        - Provide navigation back to the mobile login page
    -->

    <div class="page-shell">

        <div class="phone-frame">

            <div class="status-bar">
                <span>09:40</span>
                <span class="status-icons">📶 📡 🔋</span>
            </div>

            <div id="interaction-toolbar-container"></div>

            <div class="login-card">

                <div class="login-header">
                    <h1>Interactive Learning<br>Assistant <span>// Sign up</span></h1>
                </div>

                <div class="robot-hero">
                    <div class="robot-circle robot-circle-1"></div>
                    <div class="robot-circle robot-circle-2"></div>
                    <div class="robot-circle robot-circle-3"></div>
                    <div class="robot-avatar">🤖</div>
                </div>

                <div class="form-panel">

                    <div class="panel-handle"></div>

                    <form id="registerForm" novalidate>

                        <div class="input-group">
                            <span class="input-icon">👤</span>
                            <input type="text" id="displayName" placeholder="Display name">
                        </div>

                        <div class="input-group">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email" placeholder="Email">
                        </div>

                        <div class="input-group">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" placeholder="Password">
                        </div>

                        <div class="input-group">
                            <span class="input-icon">✅</span>
                            <input type="password" id="confirmPassword" placeholder="Confirm password">
                        </div>

                        <button id="registerButton" type="submit" class="primary-button">
                            Create account
                        </button>

                    </form>

                    <p id="registerMessage" class="error"></p>

                    <p class="signup-text">
                        Already have an account? <span id="goToLoginButton">Sign in</span>
                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="../../shared/interaction-style.js"></script>
    <script src="../shared/components/interaction-toolbar/interaction-toolbar.js"></script>
    <script src="../../shared/api.js"></script>
    <script src="../../shared/api-endpoints.js"></script>
    <script src="./js/register.js"></script>

</body>

</html>
