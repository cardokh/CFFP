<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LLA Mobile Forgot Password</title>

    <link rel="stylesheet" href="./css/mobile.css">
</head>

<body>

    <!--
        Mobile forgot-password page.

        Responsibilities:
        - Present the password recovery flow in the mobile interaction style
        - Collect the user's email address
        - Delegate recovery behavior to js/forgot-password.js
        - Provide navigation back to the mobile login page
    -->

    <div class="page-shell">

        <div class="phone-frame">

            <div class="status-bar">
                <span>09:40</span>
                <span class="status-icons">📶 📡 🔋</span>
            </div>

            <div id="interaction-toolbar-container"></div>

            <div class="login-card">

                <div class="login-header">
                    <h1>Forgot<br>Password?</h1>
                </div>

                <div class="robot-hero">
                    <div class="robot-circle robot-circle-1"></div>
                    <div class="robot-circle robot-circle-2"></div>
                    <div class="robot-circle robot-circle-3"></div>
                    <div class="robot-avatar">🤖</div>
                </div>

                <div class="form-panel">

                    <div class="panel-handle"></div>

                    <form id="forgotPasswordForm" novalidate>

                        <div class="input-group">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email" placeholder="Email">
                        </div>

                        <button id="sendResetButton" type="submit" class="primary-button">
                            Send link
                        </button>

                    </form>

                    <p id="forgotPasswordMessage" class="error"></p>

                    <p class="signup-text">
                        Remembered your password? <span id="goToLoginButton">Sign in</span>
                    </p>

                    <p class="signup-text">
                        Demo only: no real email is sent.
                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="../../shared/interaction-style.js"></script>
    <script src="../shared/components/interaction-toolbar/interaction-toolbar.js"></script>
    <script src="./js/forgot-password.js"></script>

</body>

</html>
