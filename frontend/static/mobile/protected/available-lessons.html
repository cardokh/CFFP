<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        My Lessons | HejSan
    </title>

    <link rel="stylesheet" href="./css/available-lessons.css">

</head>

<body>

    <main class="mobile-protected-layout">

        <section class="mobile-main-content">

            <div id="mobile-top-panel-container"></div>

            <div class="container">

                <fieldset class="mobile-lessons-card">

                    <legend>Lesson Library</legend>

                    <div id="mobileLessonsContainer" class="mobile-lessons-container">
                        <div class="mobile-lessons-loading">
                            Loading assigned lessons...
                        </div>
                    </div>

                </fieldset>

            </div>

            <div id="mobile-bottom-panel-container"></div>

        </section>

    </main>

    <script src="/shared/frontend-paths.js"></script>

    <script src="/shared/session-manager.js"></script>
    <script src="/shared/api.js"></script>
    <script src="/shared/ui-render.js"></script>

    <script src="../shared/components/top-panel/top-panel.js"></script>

    <script src="../shared/components/bottom-panel/bottom-panel.js"></script>

    <script>
        loadMobileTopPanel("lesson-library");


        loadMobileBottomPanel({
            desktopTarget:
                window.LLA_PATHS.desktop.protected.availableLessons
        });
    </script>

    <script src="./js/available-lessons.js"></script>

</body>

</html>
